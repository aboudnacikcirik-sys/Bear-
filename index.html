<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bear Puzzle Escape</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hero-panel">
        <p class="eyebrow">мини-игра в стиле survival puzzle</p>
        <h1>Bear Puzzle Escape</h1>
        <p>
          Управляй стикманом, ремонтируй генераторы-пазлы и убегай от медведя.
          Открой ворота, когда все пазлы будут решены.
        </p>
      </section>

      <section class="hud" aria-label="Информация об игре">
        <div><strong>Управление:</strong> WASD / стрелки</div>
        <div><strong>Действие:</strong> E около пазла или ворот</div>
        <div><strong>Цель:</strong> 3 пазла → ворота</div>
      </section>

      <canvas id="game" width="960" height="600" aria-label="Игровое поле"></canvas>

      <section class="status-panel">
        <div id="message" class="message">Найди первый пазл. Медведь уже идёт!</div>
        <button id="restart" type="button">Начать заново</button>
      </section>
    </main>

    <script src="src/game.js"></script>
  </body>
</html>
